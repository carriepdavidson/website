<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 160" fill="none">
  <!-- Rooted & Rising: the six weeks as one continuous line.
       Arrival loops -> GROUND (the pause, one still point) -> CLEAR (the old
       tangle seen as ghost) -> VISION (the fork; old path dotted, chosen path
       bends up) -> EMBODY (steady rhythm) -> ACT (rising, first bud) ->
       TRUST (open, second bud, unfinished). Pattern Line v2 grammar. -->

  <!-- The life that brought you here: small loosening loops, then easing -->
  <path d="M28 96
           C 46 84, 58 106, 72 97
           C 88 86, 82 70, 68 74
           C 55 78, 62 98, 80 99
           C 100 100, 108 84, 122 88
           C 136 92, 142 99, 156 96"
        stroke="#7C77C0" stroke-width="2.4" stroke-linecap="round" opacity="0.88"/>

  <!-- GROUND: the pause. The line pauses; the gap holds one still point. -->
  <circle cx="182" cy="93" r="5" fill="#5A55A0"/>

  <!-- CLEAR: the line resumes low and quiet; the old tangle hangs above it
       as a lilac ghost, seen but no longer followed. -->
  <path d="M208 96 C 232 93, 262 98, 292 95 C 322 92, 352 97, 382 94"
        stroke="#7C77C0" stroke-width="2.4" stroke-linecap="round" opacity="0.88"/>
  <path d="M232 74 C 248 62, 262 78, 276 68 C 290 59, 300 72, 314 66"
        stroke="#B8A9C9" stroke-width="1.8" stroke-linecap="round"
        stroke-dasharray="1 7" opacity="0.55"/>

  <!-- VISION: the fork. The not-taken path continues flat, dotted, fainter. -->
  <path d="M382 94 C 406 92, 424 94, 442 92"
        stroke="#7C77C0" stroke-width="2.4" stroke-linecap="round" opacity="0.88"/>
  <path d="M442 92 C 486 94, 534 96, 582 97 C 614 98, 638 97, 660 98"
        stroke="#B8A9C9" stroke-width="1.8" stroke-linecap="round"
        stroke-dasharray="1 8" opacity="0.5"/>

  <!-- EMBODY: the chosen path, steady rhythmic waver, gently rising -->
  <path d="M442 92
           C 470 84, 496 90, 524 83
           C 552 76, 578 82, 606 75
           C 634 68, 660 73, 688 67"
        stroke="#7C77C0" stroke-width="2.4" stroke-linecap="round" opacity="0.88"/>

  <!-- ACT: the rise steepens; the first bud -->
  <path d="M688 67
           C 722 60, 748 62, 782 53
           C 816 44, 844 47, 878 39"
        stroke="#7C77C0" stroke-width="2.4" stroke-linecap="round" opacity="0.88"/>
  <path d="M812 49 C 810 42, 809 36, 810 30" stroke="#B8A9C9" stroke-width="1.6" opacity="0.7"/>
  <ellipse cx="810" cy="26" rx="4.5" ry="6" fill="#B8A9C9" opacity="0.75" transform="rotate(-12 810 26)"/>

  <!-- TRUST: open and spacious, still wavering, never straight, never closed -->
  <path d="M878 39
           C 916 31, 946 36, 984 29
           C 1022 22, 1056 27, 1094 21
           C 1118 17, 1136 19, 1150 17"
        stroke="#7C77C0" stroke-width="2.4" stroke-linecap="round" opacity="0.88"/>
  <path d="M1032 25 C 1031 20, 1031 16, 1033 13" stroke="#B8A9C9" stroke-width="1.6" opacity="0.7"/>
  <ellipse cx="1034" cy="10" rx="4" ry="5.5" fill="#B8A9C9" opacity="0.7" transform="rotate(10 1034 10)"/>
  <circle cx="1160" cy="16" r="3.4" fill="#7C77C0" opacity="0.58"/>

  <!-- Labels -->
  <g font-family="Georgia, 'Times New Roman', serif" font-size="13" letter-spacing="2.5"
     fill="#5A55A0" opacity="0.78" text-anchor="middle">
    <text x="182" y="138">GROUND</text>
    <text x="295" y="138">CLEAR</text>
    <text x="442" y="138">VISION</text>
    <text x="565" y="120">EMBODY</text>
    <text x="783" y="96">ACT</text>
    <text x="1017" y="72">TRUST</text>
  </g>
</svg>
