<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080" role="img" aria-label="A practice card: The Three-Line Note. After activation, write what happened right before, what your body felt like, and what you did next. No fixing. Just noticing.">
  <rect width="1080" height="1080" fill="#F6F4FB"/>

  <!-- the loop easing into the pause: noticing, made visible -->
  <g transform="translate(180,120)">
    <path d="M0 100 C 60 106, 100 74, 148 66 C 204 57, 236 92, 210 118 C 188 140, 150 128, 158 100
             C 166 70, 216 58, 254 68 C 296 79, 300 122, 262 128 C 240 131, 230 114, 242 98
             C 262 72, 320 68, 360 78 C 400 88, 430 96, 452 102"
          fill="none" stroke="#7C77C0" stroke-width="4" stroke-linecap="round"/>
    <circle cx="540" cy="104" r="10" fill="#5A55A0"/>
    <circle cx="540" cy="104" r="22" fill="none" stroke="#B8B2E4" stroke-opacity="0.6" stroke-width="2"/>
    <text x="640" y="112" font-family="Arial, Helvetica, sans-serif" font-size="20" letter-spacing="4" fill="#55506A">THE PAUSE</text>
  </g>

  <g text-anchor="middle">
    <text x="540" y="380" font-family="Arial, Helvetica, sans-serif" font-size="22"
          letter-spacing="5" fill="#7C77C0">A PRACTICE FROM THE SUNDAY LETTER</text>
    <text x="540" y="460" font-family="Georgia, 'Times New Roman', serif" font-style="italic"
          font-size="64" fill="#3F3168">The Three-Line Note</text>
    <text x="540" y="516" font-family="Georgia, 'Times New Roman', serif" font-size="26" fill="#55506A">
      Later, whenever you remember. Not in the moment.</text>
  </g>

  <g font-family="Georgia, 'Times New Roman', serif" font-size="34" fill="#2E2A3A">
    <text x="250" y="630"><tspan fill="#7C77C0" font-style="italic">1.</tspan><tspan dx="18">What happened right before.</tspan></text>
    <text x="250" y="710"><tspan fill="#7C77C0" font-style="italic">2.</tspan><tspan dx="18">What my body felt like.</tspan></text>
    <text x="250" y="790"><tspan fill="#7C77C0" font-style="italic">3.</tspan><tspan dx="18">What I did next.</tspan></text>
  </g>

  <g text-anchor="middle">
    <text x="540" y="906" font-family="Georgia, 'Times New Roman', serif" font-style="italic"
          font-size="30" fill="#5A55A0">No fixing. Just noticing.</text>
    <text x="540" y="980" font-family="Arial, Helvetica, sans-serif" font-size="19"
          letter-spacing="2" fill="#55506A">Carrie Davidson, RN &#183; carriepdavidson.com</text>
  </g>
</svg>
