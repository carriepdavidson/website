<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080" role="img" aria-label="A practice card: The Emergency Brake, for when breathing is out of reach. Cold on the face or ice in the fist. Eyes: name five things you can see, out loud. Move: push a wall, shake, walk fast. Outside-in. No counting required.">
  <rect width="1080" height="1080" fill="#FFFDFA"/>

  <!-- the line running steep and tight, then caught: the brake, made visible -->
  <g transform="translate(180,120)">
    <path d="M0 130 C 40 122, 60 92, 92 76 C 124 60, 148 84, 130 108 C 116 127, 88 118, 100 94
             C 114 66, 158 48, 196 54 C 236 60, 248 96, 224 112 C 206 124, 184 110, 196 90
             C 212 62, 268 50, 312 62 C 356 74, 396 92, 428 102"
          fill="none" stroke="#7B68A0" stroke-width="4" stroke-linecap="round"/>
    <circle cx="540" cy="104" r="10" fill="#3D2B4F"/>
    <circle cx="540" cy="104" r="22" fill="none" stroke="#B8A9C9" stroke-opacity="0.6" stroke-width="2"/>
    <circle cx="540" cy="104" r="34" fill="none" stroke="#B8A9C9" stroke-opacity="0.3" stroke-width="2"/>
    <text x="640" y="112" font-family="Arial, Helvetica, sans-serif" font-size="20" letter-spacing="4" fill="#5D4E7E">THE BRAKE</text>
  </g>

  <g text-anchor="middle">
    <text x="540" y="380" font-family="Arial, Helvetica, sans-serif" font-size="22"
          letter-spacing="5" fill="#7B68A0">A PRACTICE FROM THE SUNDAY LETTER</text>
    <text x="540" y="460" font-family="Georgia, 'Times New Roman', serif" font-style="italic"
          font-size="64" fill="#3D2B4F">The Emergency Brake</text>
    <text x="540" y="516" font-family="Georgia, 'Times New Roman', serif" font-size="26" fill="#5D4E7E">
      For when breathing is out of reach.</text>
  </g>

  <g font-family="Georgia, 'Times New Roman', serif" font-size="34" fill="#2E2A3A">
    <text x="200" y="630"><tspan fill="#7B68A0" font-style="italic">1.</tspan><tspan dx="18">Cold, on the face or in the fist.</tspan></text>
    <text x="200" y="710"><tspan fill="#7B68A0" font-style="italic">2.</tspan><tspan dx="18">Eyes: name five things, out loud.</tspan></text>
    <text x="200" y="790"><tspan fill="#7B68A0" font-style="italic">3.</tspan><tspan dx="18">Move: push a wall, shake, walk.</tspan></text>
  </g>

  <g text-anchor="middle">
    <text x="540" y="906" font-family="Georgia, 'Times New Roman', serif" font-style="italic"
          font-size="30" fill="#5D4E7E">Outside-in. No counting required.</text>
    <text x="540" y="980" font-family="Arial, Helvetica, sans-serif" font-size="19"
          letter-spacing="2" fill="#5D4E7E">Carrie Davidson, RN &#183; carriepdavidson.com</text>
  </g>
</svg>
