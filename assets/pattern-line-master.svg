<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="160" viewBox="0 0 1200 160" role="img" aria-label="One line moving from repeating loops, through a break and a pause, into bloom and an open path">
  <!-- THE PATTERN LINE: one continuous story, left to right.
       1 THE LOOP (Witness): tight repeating coils, same size: the pattern running.
       2 THE SEEING (Understand): the last coil opens slightly: the loop becomes visible.
       3 THE BREAK + THE PAUSE (Interrupt): the line stops; a held breath; a still point.
       4 THE BLOOM (Find Creative Flow): the line returns and buds: making something new.
       5 THE PATH (Build the Intentional Life): the line rises, open and unfinished. -->

  <!-- 1+2: the loops: three tight, one opening -->
  <path d="M40 100
           C 70 100, 70 60, 100 60 C 130 60, 130 100, 100 100 C 88 100, 82 92, 90 82
           C 110 58, 150 58, 180 60 C 210 62, 210 100, 180 100 C 168 100, 162 92, 170 82
           C 190 58, 230 58, 260 60 C 290 62, 290 100, 260 100 C 248 100, 242 92, 250 82
           C 272 56, 320 54, 356 62 C 388 69, 404 84, 416 92"
        fill="none" stroke="#C9A87C" stroke-width="3" stroke-linecap="round"/>

  <!-- 3: the break and the pause: a gap, and one still point inside it -->
  <circle cx="470" cy="94" r="7" fill="#5E4B85"/>
  <circle cx="470" cy="94" r="14" fill="none" stroke="#B8A9C9" stroke-width="1.5" opacity="0.6"/>

  <!-- 4: the return and the bloom -->
  <path d="M524 92 C 560 86, 600 82, 640 76 C 700 67, 760 60, 820 56"
        fill="none" stroke="#C9A87C" stroke-width="3" stroke-linecap="round"/>
  <g stroke="#C9A87C" stroke-width="2" fill="none" stroke-linecap="round">
    <path d="M612 80 C 606 66, 610 54, 620 44"/>
    <path d="M700 66 C 708 52, 706 42, 700 32"/>
  </g>
  <g fill="#B8A9C9">
    <ellipse cx="622" cy="40" rx="6" ry="9" transform="rotate(18 622 40)"/>
    <ellipse cx="699" cy="28" rx="6" ry="9" transform="rotate(-12 699 28)"/>
  </g>
  <g fill="#B8A9C9" opacity="0.7">
    <ellipse cx="610" cy="52" rx="4" ry="6" transform="rotate(28 610 52)"/>
    <ellipse cx="706" cy="42" rx="4" ry="6" transform="rotate(-20 706 42)"/>
  </g>

  <!-- 5: the path: rising, open, unfinished -->
  <path d="M820 56 C 900 51, 1000 48, 1080 44 C 1110 42.5, 1140 41, 1160 40"
        fill="none" stroke="#C9A87C" stroke-width="3" stroke-linecap="round" stroke-dasharray="none"/>
  <circle cx="1160" cy="40" r="4" fill="#C9A87C" opacity="0.55"/>
</svg>
