<svg xmlns="http://www.w3.org/2000/svg" style="display:none" aria-hidden="true">
  <!-- SIGNATURE THREAD icon set. One continuous line per glyph, drawn in the
       thread violet. 24x24 viewBox, 1.8px stroke, round caps/joins. Reference
       inline via <use href="/assets/icons-thread.svg#icon-home"></use>.
       Symbol ids: home, about, coaching, method, resources, podcast, journal, contact. -->
  <defs>
    <style>
      .thread-glyph { fill: none; stroke: #7C77C0; stroke-width: 1.8;
        stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <symbol id="icon-home" viewBox="0 0 24 24">
    <g class="thread-glyph">
      <path d="M3.5 11.5 L12 4 L20.5 11.5"/>
      <path d="M5.5 10 V19.5 H18.5 V10"/>
      <path d="M9.8 19.5 V13.5 H14.2 V19.5"/>
    </g>
  </symbol>

  <symbol id="icon-about" viewBox="0 0 24 24">
    <g class="thread-glyph">
      <circle cx="12" cy="6.4" r="2.6"/>
      <path d="M6.5 20 C6.5 14.5 8.7 11.5 12 11.5 C15.3 11.5 17.5 14.5 17.5 20"/>
    </g>
  </symbol>

  <symbol id="icon-coaching" viewBox="0 0 24 24">
    <g class="thread-glyph">
      <path d="M12 20 C5.5 15.6 4 12.4 4 9.6 A4 4 0 0 1 12 8 A4 4 0 0 1 20 9.6 C20 12.4 18.5 15.6 12 20 Z"/>
    </g>
  </symbol>

  <symbol id="icon-method" viewBox="0 0 24 24">
    <g class="thread-glyph">
      <path d="M12 3 A9 9 0 1 0 12 21 A9 9 0 1 0 12 3 Z"/>
      <path d="M14.5 4.2 A9 9 0 0 0 14.5 19.8 A11 11 0 0 1 14.5 4.2 Z"/>
    </g>
  </symbol>

  <symbol id="icon-resources" viewBox="0 0 24 24">
    <g class="thread-glyph">
      <path d="M12 3.5 C15.6 8.4 17.8 11.6 17.8 14.4 A5.8 5.8 0 0 1 6.2 14.4 C6.2 11.6 8.4 8.4 12 3.5 Z"/>
    </g>
  </symbol>

  <symbol id="icon-podcast" viewBox="0 0 24 24">
    <g class="thread-glyph">
      <path d="M9 5.6 A3 3 0 0 1 15 5.6 V10.6 A3 3 0 0 1 9 10.6 Z"/>
      <path d="M5.5 10.4 A6.5 6.5 0 0 0 18.5 10.4"/>
      <path d="M12 16.9 V20.5"/>
    </g>
  </symbol>

  <symbol id="icon-journal" viewBox="0 0 24 24">
    <g class="thread-glyph">
      <path d="M12 6.4 C9.6 4.7 6.6 4.7 4 6 V18.4 C6.6 17.1 9.6 17.1 12 18.8 C14.4 17.1 17.4 17.1 20 18.4 V6 C17.4 4.7 14.4 4.7 12 6.4 Z"/>
      <path d="M12 6.4 V18.8"/>
    </g>
  </symbol>

  <symbol id="icon-contact" viewBox="0 0 24 24">
    <g class="thread-glyph">
      <circle cx="12" cy="12" r="3.1"/>
      <path d="M15.1 12 V13.9 A2.1 2.1 0 0 0 19 12.8 A7.4 7.4 0 1 0 15.6 18.4"/>
    </g>
  </symbol>
</svg>
